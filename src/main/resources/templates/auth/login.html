<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/cms-theme.css}"/>
  <style>
    .cms-auth-page {
      position: relative;
      overflow: hidden;
    }
    .auth-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .auth-orb-1 {
      width: 500px; height: 500px;
      background: rgba(59,130,246,0.20);
      top: -100px; left: -100px;
    }
    .auth-orb-2 {
      width: 400px; height: 400px;
      background: rgba(99,102,241,0.16);
      bottom: -80px; right: -80px;
    }
    .auth-orb-3 {
      width: 300px; height: 300px;
      background: rgba(14,165,233,0.12);
      top: 40%; left: 60%;
    }
    .cms-auth-card { position: relative; z-index: 1; }
    .cms-auth-card .form-label { color: #94a3b8; }
    .cms-auth-card .form-check-label { color: #64748b; font-size: 0.82rem; }
    .form-check-input { background-color: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.20); }
    .form-check-input:checked { background-color: #3b82f6; border-color: #3b82f6; }
    .input-group .input-group-text { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); color: #64748b; }
    .input-group .form-control { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); color: #f1f5f9; }
    .input-group .form-control::placeholder { color: rgba(255,255,255,0.20); }
    .input-group .form-control:focus { background: rgba(255,255,255,0.10); border-color: rgba(59,130,246,0.55); box-shadow: none; color: #f1f5f9; }
    .input-group button.input-group-text { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); cursor: pointer; }
    .input-group button.input-group-text:hover { background: rgba(255,255,255,0.12); }
    .btn-cms-primary { padding: 0.65rem 1.5rem; font-size: 0.9rem; letter-spacing: 0.3px; }
  </style>
</head>
<body>
<div class="cms-auth-page">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>

  <div class="cms-auth-card">
    <div class="cms-auth-logo">
      <div class="logo-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <div class="logo-text">
        <h1>CMS Portal</h1>
        <span>Canteen Management System</span>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access your dashboard</p>

    <div th:if="${param.logout}" class="alert alert-info py-2 mb-3">
      <i class="bi bi-info-circle me-1"></i> You have been signed out successfully.
    </div>
    <div th:if="${param.changed}" class="alert alert-success py-2 mb-3">
      <i class="bi bi-check-circle me-1"></i> Password changed. Please sign in again.
    </div>

    <form action="/login" method="post">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text border-end-0"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0"
                 placeholder="you@cms.org" required autocomplete="email"/>
        </div>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label mb-0">Password</label>
          <a href="/forgot-password" class="fs-xs" style="color:#60a5fa;">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text border-end-0"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="loginPassword"
                 class="form-control border-start-0 ps-0 border-end-0"
                 placeholder="••••••••" required autocomplete="current-password"/>
          <button class="input-group-text border-start-0" type="button"
                  onclick="togglePwd('loginPassword',this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="rememberMe"/>
        <label class="form-check-label" for="rememberMe">Remember me on this device</label>
      </div>

      <button type="submit" class="btn btn-cms-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>

    <div class="cms-auth-footer">
      &copy; 2026 Canteen Management System &nbsp;&middot;&nbsp; v1.0.0
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { inp.type = 'password'; icon.className = 'bi bi-eye'; }
  }
</script>
</body>
</html>
