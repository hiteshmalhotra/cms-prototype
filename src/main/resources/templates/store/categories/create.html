<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Category — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('store')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/store">Store</a></li><li class="breadcrumb-item"><a href="/store/categories">Categories</a></li><li class="breadcrumb-item active">New</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-tags me-2"></i>New Category</h1></div>
    <div class="page-header-actions"><a href="/store/categories" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
  </div>
  <div class="row"><div class="col-lg-6">
    <div class="cms-card">
      <div class="card-header-cms"><h5>Category Details</h5></div>
      <div class="card-body-cms">
        <form action="/store/categories/create" method="post">
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Category Code <span class="text-danger">*</span></label><input type="text" name="code" class="form-control" placeholder="CAT-001" required/></div>
            <div class="col-12"><label class="form-label">Category Name <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" placeholder="Category name" required/></div>
            <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
            <div class="col-12"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="isActive" checked/><label class="form-check-label">Active</label></div></div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-cms-primary"><i class="bi bi-save me-1"></i>Save</button>
            <a href="/store/categories" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div></div>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script></body></html>
