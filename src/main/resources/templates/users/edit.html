<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Edit User — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('users-list')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0">
    <li class="breadcrumb-item"><a href="/dashboard">Home</a></li>
    <li class="breadcrumb-item"><a href="/users">User Management</a></li>
    <li class="breadcrumb-item active">Edit User</li>
  </ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-pencil-square me-2"></i>Edit User</h1><div class="page-subtitle">Update user account details</div></div>
    <div class="page-header-actions">
      <a href="/users/1" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
  </div>
  <div class="row">
    <div class="col-lg-8">
      <div class="cms-card">
        <div class="card-header-cms"><h5><i class="bi bi-person-fill me-2"></i>Edit User Information</h5></div>
        <div class="card-body-cms">
          <form action="/users/1/edit" method="post">
            <div class="form-section-title">Personal Details</div>
            <div class="row g-3 mb-3">
              <div class="col-sm-6"><label class="form-label">First Name <span class="text-danger">*</span></label><input type="text" name="firstName" class="form-control" placeholder="First name" required/></div>
              <div class="col-sm-6"><label class="form-label">Last Name <span class="text-danger">*</span></label><input type="text" name="lastName" class="form-control" placeholder="Last name" required/></div>
              <div class="col-sm-6"><label class="form-label">Email Address</label><input type="email" class="form-control" placeholder="user@cms.org" readonly/><div class="form-text">Email cannot be changed after creation.</div></div>
              <div class="col-sm-6"><label class="form-label">Role <span class="text-danger">*</span></label>
                <select name="role" class="form-select" required>
                  <option>ROLE_ADMIN</option><option>ROLE_STORE_MANAGER</option>
                  <option>ROLE_KITCHEN_MANAGER</option><option>ROLE_CANTEEN_MANAGER</option>
                  <option>ROLE_ACCOUNT_MANAGER</option><option>ROLE_USER</option>
                </select>
              </div>
              <div class="col-12"><div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="isEnabled" id="isEnabled" checked/>
                <label class="form-check-label" for="isEnabled">Account Active</label>
              </div></div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-cms-primary"><i class="bi bi-save me-1"></i>Save Changes</button>
              <a href="/users/1" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="cms-footer">&copy; 2026 CMS &nbsp;|&nbsp; <a href="/dashboard">Dashboard</a></footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script>
</body></html>
