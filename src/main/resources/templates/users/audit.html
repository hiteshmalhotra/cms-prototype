<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>User Audit Trail — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('users-list')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/users">Users</a></li><li class="breadcrumb-item active">Audit Trail</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-journal-text me-2"></i>User Audit Trail</h1><div class="page-subtitle">Complete activity history for this user</div></div>
    <div class="page-header-actions"><a href="/users/1" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back to User</a></div>
  </div>
  <div class="cms-card">
    <div class="card-header-cms"><h5><i class="bi bi-shield-check me-2"></i>Activity Log</h5></div>
    <div class="cms-table-wrapper">
      <table class="cms-table">
        <thead><tr><th>Timestamp</th><th>Action</th><th>Module</th><th>Description</th><th>IP Address</th></tr></thead>
        <tbody>
          <tr><td colspan="5" class="text-center text-muted py-4"><i class="bi bi-journal me-2"></i>No audit records found for this user</td></tr>
        </tbody>
      </table>
    </div>
    <div class="d-flex align-items-center justify-content-between p-3 border-top">
      <div class="fs-sm text-muted">Showing — entries</div>
      <nav><ul class="pagination cms-pagination mb-0"><li class="page-item disabled"><a class="page-link" href="#">«</a></li><li class="page-item active"><a class="page-link" href="#">1</a></li><li class="page-item disabled"><a class="page-link" href="#">»</a></li></ul></nav>
    </div>
  </div>
</main>
<footer class="cms-footer">&copy; 2026 CMS &nbsp;|&nbsp; <a href="/audit">System Audit</a></footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script>
</body></html>
