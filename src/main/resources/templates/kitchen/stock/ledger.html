<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kitchen Stock Ledger — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('kitchen')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/kitchen">Kitchen</a></li><li class="breadcrumb-item active">Stock Ledger</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-journal-bookmark me-2"></i>Kitchen Stock Ledger</h1></div>
  </div>
  <div class="cms-card">
    <div class="filter-bar">
      <div class="search-box"><i class="bi bi-search"></i><input type="text" class="form-control" placeholder="Search ingredient..."/></div>
      <select class="form-select form-select-sm" style="width:auto;"><option>All Types</option><option>RECEIPT</option><option>CONSUMPTION</option><option>TRANSFER_IN</option><option>TRANSFER_OUT</option><option>ADJUSTMENT</option></select>
      <input type="date" class="form-control form-control-sm" style="width:auto;"/>
      <input type="date" class="form-control form-control-sm" style="width:auto;"/>
    </div>
    <div class="cms-table-wrapper">
      <table class="cms-table">
        <thead><tr><th>Date</th><th>Transaction #</th><th>Ingredient</th><th>Type</th><th>Qty In</th><th>Qty Out</th><th>Balance</th><th>Reference</th></tr></thead>
        <tbody><tr><td colspan="8" class="text-center text-muted py-4"><i class="bi bi-journal me-2"></i>No ledger entries</td></tr></tbody>
      </table>
    </div>
    <div class="d-flex align-items-center justify-content-between p-3 border-top">
      <div class="fs-sm text-muted">Showing — entries</div>
      <nav><ul class="pagination cms-pagination mb-0"><li class="page-item disabled"><a class="page-link" href="#">«</a></li><li class="page-item active"><a class="page-link" href="#">1</a></li><li class="page-item disabled"><a class="page-link" href="#">»</a></li></ul></nav>
    </div>
  </div>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script></body></html>
