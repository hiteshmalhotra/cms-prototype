<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Production Order Detail — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('kitchen')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/kitchen">Kitchen</a></li><li class="breadcrumb-item"><a href="/kitchen/production-orders">Production Orders</a></li><li class="breadcrumb-item active">Detail</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-fire me-2"></i>Production Order — PO-—</h1></div>
    <div class="page-header-actions">
      <a href="/kitchen/production-orders" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <form action="/kitchen/production-orders/1/start" method="post" class="d-inline"><button type="submit" class="btn btn-outline-primary btn-sm"><i class="bi bi-fire me-1"></i>Start</button></form>
      <form action="/kitchen/production-orders/1/complete" method="post" class="d-inline"><button type="submit" class="btn btn-cms-primary btn-sm"><i class="bi bi-check-circle me-1"></i>Complete</button></form>
      <form action="/kitchen/production-orders/1/cancel" method="post" class="d-inline"><button type="submit" class="btn btn-outline-danger btn-sm" data-confirm="Cancel this production order?"><i class="bi bi-x me-1"></i>Cancel</button></form>
    </div>
  </div>
  <div class="row g-3">
    <div class="col-md-8">
      <div class="cms-card mb-3">
        <div class="card-header-cms"><h5>Order Information</h5></div>
        <div class="card-body-cms">
          <div class="row g-3">
            <div class="col-sm-4"><div class="detail-label">Order #</div><div class="detail-value">—</div></div>
            <div class="col-sm-4"><div class="detail-label">Status</div><div class="detail-value"><span class="cms-badge badge-pending">PLANNED</span></div></div>
            <div class="col-sm-4"><div class="detail-label">Recipe</div><div class="detail-value">—</div></div>
            <div class="col-sm-4"><div class="detail-label">Quantity</div><div class="detail-value">— batches</div></div>
            <div class="col-sm-4"><div class="detail-label">Scheduled</div><div class="detail-value">—</div></div>
            <div class="col-sm-4"><div class="detail-label">Assigned To</div><div class="detail-value">—</div></div>
          </div>
        </div>
      </div>
      <div class="cms-card">
        <div class="card-header-cms"><h5>Ingredients Used</h5></div>
        <div class="cms-table-wrapper">
          <table class="cms-table">
            <thead><tr><th>Ingredient</th><th>Required Qty</th><th>Actual Qty</th><th>Unit</th></tr></thead>
            <tbody><tr><td colspan="4" class="text-center text-muted py-3">No ingredients</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="cms-card">
        <div class="card-header-cms"><h5>Status Timeline</h5></div>
        <div class="card-body-cms">
          <div class="cms-timeline">
            <div class="timeline-item"><div class="timeline-dot success"></div><div class="timeline-content">Order Created<div class="timeline-meta">—</div></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script></body></html>
