<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Recipe Item — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('kitchen')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/kitchen">Kitchen</a></li><li class="breadcrumb-item"><a href="/kitchen/recipe-items">Recipe Items</a></li><li class="breadcrumb-item active">New</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-basket me-2"></i>New Recipe Item</h1></div>
    <div class="page-header-actions"><a href="/kitchen/recipe-items" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
  </div>
  <div class="row"><div class="col-lg-8">
    <div class="cms-card">
      <div class="card-header-cms"><h5>Item Details</h5></div>
      <div class="card-body-cms">
        <form action="/kitchen/recipe-items/create" method="post">
          <div class="row g-3">
            <div class="col-sm-4"><label class="form-label">Item Code <span class="text-danger">*</span></label><input type="text" name="code" class="form-control" placeholder="KI-001" required/></div>
            <div class="col-sm-8"><label class="form-label">Item Name <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" placeholder="Ingredient name" required/></div>
            <div class="col-sm-6"><label class="form-label">Item Type <span class="text-danger">*</span></label>
              <select name="type" class="form-select" required><option>RAW</option><option>SEMI_PROCESSED</option><option>FINISHED</option></select></div>
            <div class="col-sm-6"><label class="form-label">Unit of Measure <span class="text-danger">*</span></label>
              <select name="unit" class="form-select" required><option>KG</option><option>GRAM</option><option>LITRE</option><option>ML</option><option>PIECE</option></select></div>
            <div class="col-sm-6"><label class="form-label">Cost per Unit (₹)</label><input type="number" name="costPerUnit" class="form-control" placeholder="0.00" step="0.01" min="0"/></div>
            <div class="col-sm-6"><label class="form-label">Reorder Level</label><input type="number" name="reorderLevel" class="form-control" placeholder="0" min="0"/></div>
            <div class="col-12"><label class="form-label">Allergens</label><input type="text" name="allergens" class="form-control" placeholder="e.g. Gluten, Dairy, Nuts (comma separated)"/></div>
            <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2"></textarea></div>
            <div class="col-12"><div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="isActive" checked/><label class="form-check-label">Active</label></div></div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-cms-primary"><i class="bi bi-save me-1"></i>Save</button>
            <a href="/kitchen/recipe-items" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div></div>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script></body></html>
