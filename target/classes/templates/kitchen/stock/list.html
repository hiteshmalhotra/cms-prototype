<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kitchen Stock — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('kitchen')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/kitchen">Kitchen</a></li><li class="breadcrumb-item active">Stock</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-bar-chart me-2"></i>Kitchen Stock</h1><div class="page-subtitle">Current ingredient inventory levels</div></div>
    <div class="page-header-actions"><a href="/kitchen/ledger" class="btn btn-outline-secondary btn-sm"><i class="bi bi-journal-bookmark me-1"></i>Ledger</a></div>
  </div>
  <div class="row g-3 mb-3">
    <div class="col-sm-4"><div class="stat-card"><div class="stat-icon" style="background:#E3F2FD;color:#1565C0;"><i class="bi bi-boxes"></i></div><div class="stat-info"><div class="stat-value">—</div><div class="stat-label">Total Ingredients</div></div></div></div>
    <div class="col-sm-4"><div class="stat-card"><div class="stat-icon" style="background:#FFF8E1;color:#F57F17;"><i class="bi bi-exclamation-triangle"></i></div><div class="stat-info"><div class="stat-value">—</div><div class="stat-label">Low Stock</div></div></div></div>
    <div class="col-sm-4"><div class="stat-card"><div class="stat-icon" style="background:#FCE4D6;color:#A32020;"><i class="bi bi-dash-circle"></i></div><div class="stat-info"><div class="stat-value">—</div><div class="stat-label">Out of Stock</div></div></div></div>
  </div>
  <div class="cms-card">
    <div class="filter-bar">
      <div class="search-box"><i class="bi bi-search"></i><input type="text" class="form-control" placeholder="Search ingredients..."/></div>
      <select class="form-select form-select-sm" style="width:auto;"><option>All Types</option><option>RAW</option><option>SEMI_PROCESSED</option><option>FINISHED</option></select>
      <select class="form-select form-select-sm" style="width:auto;"><option>All Levels</option><option>Normal</option><option>Low</option><option>Out of Stock</option></select>
    </div>
    <div class="cms-table-wrapper">
      <table class="cms-table">
        <thead><tr><th>Code</th><th>Ingredient</th><th>Type</th><th>Unit</th><th>Current Qty</th><th>Reorder Level</th><th>Level</th><th>Last Updated</th></tr></thead>
        <tbody><tr><td colspan="8" class="text-center text-muted py-4"><i class="bi bi-inbox me-2"></i>No stock records found</td></tr></tbody>
      </table>
    </div>
  </div>
</main>
<footer class="cms-footer">&copy; 2026 CMS &nbsp;|&nbsp; <a href="/kitchen">Kitchen</a></footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script></body></html>
