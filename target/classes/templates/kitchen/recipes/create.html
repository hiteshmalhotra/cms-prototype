<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Recipe — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('kitchen')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/kitchen">Kitchen</a></li><li class="breadcrumb-item"><a href="/kitchen/recipes">Recipes</a></li><li class="breadcrumb-item active">New</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-journal-plus me-2"></i>New Recipe</h1></div>
    <div class="page-header-actions"><a href="/kitchen/recipes" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
  </div>
  <form action="/kitchen/recipes/create" method="post">
    <div class="cms-card mb-3">
      <div class="card-header-cms"><h5>Recipe Details</h5></div>
      <div class="card-body-cms">
        <div class="row g-3">
          <div class="col-sm-4"><label class="form-label">Recipe Code <span class="text-danger">*</span></label><input type="text" name="code" class="form-control" placeholder="RCP-001" required/></div>
          <div class="col-sm-8"><label class="form-label">Recipe Name <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" placeholder="Dish name" required/></div>
          <div class="col-sm-4"><label class="form-label">Category</label><input type="text" name="category" class="form-control" placeholder="e.g. Main Course"/></div>
          <div class="col-sm-4"><label class="form-label">Yield (servings)</label><input type="number" name="yield" class="form-control" placeholder="1" min="1"/></div>
          <div class="col-sm-4"><label class="form-label">Prep Time (min)</label><input type="number" name="prepTime" class="form-control" placeholder="30" min="0"/></div>
          <div class="col-12"><label class="form-label">Instructions</label><textarea name="instructions" class="form-control" rows="4" placeholder="Step-by-step preparation instructions..."></textarea></div>
        </div>
      </div>
    </div>
    <div class="cms-card mb-3">
      <div class="card-header-cms d-flex justify-content-between align-items-center"><h5>Ingredients (BOM)</h5><button type="button" class="btn btn-outline-primary btn-sm" id="addIngredient"><i class="bi bi-plus me-1"></i>Add Ingredient</button></div>
      <div class="cms-table-wrapper">
        <table class="cms-table">
          <thead><tr><th>Ingredient</th><th>Quantity</th><th>Unit</th><th>Notes</th><th></th></tr></thead>
          <tbody id="ingredientBody">
            <tr class="ingredient-row">
              <td><select name="itemId[]" class="form-select form-select-sm"><option value="">Select ingredient...</option></select></td>
              <td><input type="number" name="qty[]" class="form-control form-control-sm" placeholder="0" step="0.001" min="0"/></td>
              <td><input type="text" name="unit[]" class="form-control form-control-sm" readonly placeholder="Unit"/></td>
              <td><input type="text" name="notes[]" class="form-control form-control-sm" placeholder="Optional"/></td>
              <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-trash"></i></button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" name="action" value="DRAFT" class="btn btn-outline-secondary"><i class="bi bi-save me-1"></i>Save Draft</button>
      <button type="submit" name="action" value="APPROVED" class="btn btn-cms-primary"><i class="bi bi-check-circle me-1"></i>Save &amp; Approve</button>
      <a href="/kitchen/recipes" class="btn btn-outline-danger">Cancel</a>
    </div>
  </form>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script>
<script>
document.getElementById('addIngredient').addEventListener('click',function(){
  const tbody=document.getElementById('ingredientBody');
  const row=tbody.querySelector('.ingredient-row').cloneNode(true);
  row.querySelectorAll('input').forEach(i=>i.value='');
  tbody.appendChild(row);
});
document.addEventListener('click',function(e){
  if(e.target.closest('.remove-row')){
    const rows=document.querySelectorAll('.ingredient-row');
    if(rows.length>1)e.target.closest('tr').remove();
  }
});
</script>
</body></html>
