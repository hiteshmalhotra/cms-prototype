<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/cms-theme.css}"/>
</head>
<body>
<div class="cms-auth-page">
  <div class="cms-auth-card">
    <!-- Logo -->
    <div class="cms-auth-logo">
      <div class="logo-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <div class="logo-text">
        <h1>CMS Portal</h1>
        <span>Canteen Management System</span>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access your dashboard</p>

    <!-- Alert: logged out -->
    <div th:if="${param.logout}" class="alert alert-info alert-sm py-2 mb-3" style="font-size:0.82rem;">
      <i class="bi bi-info-circle me-1"></i> You have been signed out successfully.
    </div>
    <!-- Alert: password changed -->
    <div th:if="${param.changed}" class="alert alert-success alert-sm py-2 mb-3" style="font-size:0.82rem;">
      <i class="bi bi-check-circle me-1"></i> Password changed. Please sign in again.
    </div>

    <form action="/login" method="post">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0"
                 placeholder="you@cms.org" required autocomplete="email"/>
        </div>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label mb-0">Password</label>
          <a href="/forgot-password" class="fs-xs text-accent-cms">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" id="loginPassword"
                 class="form-control border-start-0 ps-0 border-end-0"
                 placeholder="••••••••" required autocomplete="current-password"/>
          <button class="input-group-text bg-light border-start-0" type="button"
                  onclick="togglePwd('loginPassword',this)">
            <i class="bi bi-eye text-muted"></i>
          </button>
        </div>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="rememberMe"/>
        <label class="form-check-label fs-sm" for="rememberMe">Remember me on this device</label>
      </div>

      <button type="submit" class="btn btn-cms-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>

    <div class="cms-auth-footer">
      &copy; 2026 Canteen Management System &nbsp;&middot;&nbsp; v1.0.0
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash text-muted'; }
    else { inp.type = 'password'; icon.className = 'bi bi-eye text-muted'; }
  }
</script>
</body>
</html>
