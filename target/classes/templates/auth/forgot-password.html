<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — CMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/cms-theme.css}"/>
</head>
<body>
<div class="cms-auth-page">
  <div class="cms-auth-card">
    <div class="cms-auth-logo">
      <div class="logo-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <div class="logo-text"><h1>CMS Portal</h1><span>Canteen Management System</span></div>
    </div>
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your registered email and we'll send an OTP.</p>
    <form action="/forgot-password" method="post">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="you@cms.org" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-cms-primary w-100 py-2">
        <i class="bi bi-send me-1"></i> Send OTP
      </button>
    </form>
    <div class="text-center mt-3 fs-sm">
      <a href="/login"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
    </div>
    <div class="cms-auth-footer">&copy; 2026 Canteen Management System</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
