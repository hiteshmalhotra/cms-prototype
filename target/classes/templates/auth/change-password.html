<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password — CMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/cms-theme.css}"/>
</head>
<body>
<div class="cms-auth-page">
  <div class="cms-auth-card">
    <div class="cms-auth-logo">
      <div class="logo-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <div class="logo-text"><h1>CMS Portal</h1><span>Canteen Management System</span></div>
    </div>
    <h2>Set New Password</h2>
    <p class="subtitle">Your new password must be at least 8 characters.</p>
    <form action="/change-password" method="post">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="newPassword" id="newPwd" class="form-control border-start-0 ps-0 border-end-0" placeholder="Min 8 characters" required/>
          <button class="input-group-text bg-light border-start-0" type="button" onclick="togglePwd('newPwd',this)"><i class="bi bi-eye text-muted"></i></button>
        </div>
        <div class="form-text">Must contain uppercase, lowercase, digit, and special character.</div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm New Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
          <input type="password" name="confirmPassword" id="confirmPwd" class="form-control border-start-0 ps-0 border-end-0" placeholder="Re-enter password" required/>
          <button class="input-group-text bg-light border-start-0" type="button" onclick="togglePwd('confirmPwd',this)"><i class="bi bi-eye text-muted"></i></button>
        </div>
      </div>
      <!-- Strength indicator -->
      <div class="mb-3">
        <div class="d-flex gap-1 mb-1">
          <div class="flex-fill rounded" id="s1" style="height:4px;background:#e0e0e0;"></div>
          <div class="flex-fill rounded" id="s2" style="height:4px;background:#e0e0e0;"></div>
          <div class="flex-fill rounded" id="s3" style="height:4px;background:#e0e0e0;"></div>
          <div class="flex-fill rounded" id="s4" style="height:4px;background:#e0e0e0;"></div>
        </div>
        <div class="fs-xs text-muted" id="strengthLabel">Password strength</div>
      </div>
      <button type="submit" class="btn btn-cms-primary w-100 py-2">
        <i class="bi bi-check-circle me-1"></i> Save New Password
      </button>
    </form>
    <div class="cms-auth-footer">&copy; 2026 Canteen Management System</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd(id, btn) {
    const inp = document.getElementById(id), icon = btn.querySelector('i');
    if (inp.type==='password'){inp.type='text';icon.className='bi bi-eye-slash text-muted';}
    else{inp.type='password';icon.className='bi bi-eye text-muted';}
  }
  document.getElementById('newPwd').addEventListener('input', function() {
    const v = this.value, segs = [s1,s2,s3,s4].map(id=>document.getElementById(id));
    const score = [/.{8,}/, /[A-Z]/, /[0-9]/, /[^A-Za-z0-9]/].filter(r=>r.test(v)).length;
    const colors = ['','#e53e3e','#f6ad55','#48bb78','#2E75B6'];
    const labels = ['','Weak','Fair','Good','Strong'];
    segs.forEach((s,i) => s.style.background = i<score ? colors[score] : '#e0e0e0');
    document.getElementById('strengthLabel').textContent = labels[score] || 'Password strength';
  });
</script>
</body>
</html>
