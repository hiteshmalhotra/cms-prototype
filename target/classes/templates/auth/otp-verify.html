<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify OTP — CMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/cms-theme.css}"/>
</head>
<body>
<div class="cms-auth-page">
  <div class="cms-auth-card">
    <div class="cms-auth-logo">
      <div class="logo-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <div class="logo-text"><h1>CMS Portal</h1><span>Canteen Management System</span></div>
    </div>
    <h2>Verify OTP</h2>
    <p class="subtitle">A 6-digit OTP has been sent to your registered email address.</p>
    <form action="/otp-verify" method="post">
      <div class="mb-4">
        <label class="form-label">Enter 6-Digit OTP</label>
        <div class="d-flex gap-2 justify-content-center">
          <input type="text" maxlength="1" class="form-control text-center fw-bold fs-4" style="width:48px;height:52px;" oninput="focusNext(this)"/>
          <input type="text" maxlength="1" class="form-control text-center fw-bold fs-4" style="width:48px;height:52px;" oninput="focusNext(this)"/>
          <input type="text" maxlength="1" class="form-control text-center fw-bold fs-4" style="width:48px;height:52px;" oninput="focusNext(this)"/>
          <input type="text" maxlength="1" class="form-control text-center fw-bold fs-4" style="width:48px;height:52px;" oninput="focusNext(this)"/>
          <input type="text" maxlength="1" class="form-control text-center fw-bold fs-4" style="width:48px;height:52px;" oninput="focusNext(this)"/>
          <input type="text" maxlength="1" class="form-control text-center fw-bold fs-4" style="width:48px;height:52px;" oninput="focusNext(this)"/>
        </div>
        <input type="hidden" name="otp" id="otpHidden"/>
      </div>
      <div class="text-center mb-3 fs-sm text-muted">
        OTP expires in <span id="otpTimer" class="fw-600 text-danger">4:59</span>
        &nbsp;&middot;&nbsp; <a href="/forgot-password">Resend OTP</a>
      </div>
      <button type="submit" class="btn btn-cms-primary w-100 py-2">
        <i class="bi bi-shield-check me-1"></i> Verify OTP
      </button>
    </form>
    <div class="text-center mt-3 fs-sm"><a href="/login"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a></div>
    <div class="cms-auth-footer">&copy; 2026 Canteen Management System</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function focusNext(el) {
    if (el.value.length === 1) {
      const next = el.nextElementSibling;
      if (next && next.tagName === 'INPUT') next.focus();
    }
  }
  // Countdown timer
  let secs = 299;
  const timer = document.getElementById('otpTimer');
  const iv = setInterval(() => {
    secs--;
    if (secs <= 0) { clearInterval(iv); timer.textContent = 'Expired'; return; }
    const m = Math.floor(secs/60), s = secs%60;
    timer.textContent = m + ':' + String(s).padStart(2,'0');
  }, 1000);
</script>
</body>
</html>
