<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Delete User — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('users-list')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/users">Users</a></li><li class="breadcrumb-item active">Delete</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="row justify-content-center mt-4">
    <div class="col-md-6">
      <div class="cms-card text-center p-4">
        <div style="font-size:3rem;color:#A32020;margin-bottom:1rem;"><i class="bi bi-person-x-fill"></i></div>
        <h4 class="text-danger mb-2">Delete User?</h4>
        <p class="text-muted mb-4">Are you sure you want to deactivate this user account? The user will no longer be able to log in. This action sets <code>is_enabled = false</code> and cannot be reversed without admin intervention.</p>
        <div class="cms-card mb-4 text-start" style="background:#FFF5F5;border:1px solid #FCE4D6;">
          <div class="card-body-cms">
            <div class="row g-2">
              <div class="col-6"><div class="detail-label">Name</div><div class="detail-value">—</div></div>
              <div class="col-6"><div class="detail-label">Email</div><div class="detail-value">—</div></div>
              <div class="col-6"><div class="detail-label">Role</div><div class="detail-value">—</div></div>
              <div class="col-6"><div class="detail-label">Status</div><div class="detail-value"><span class="cms-badge badge-active">Active</span></div></div>
            </div>
          </div>
        </div>
        <div class="d-flex gap-2 justify-content-center">
          <a href="/users" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Cancel</a>
          <form action="/users/1/delete" method="post" class="d-inline">
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Yes, Deactivate User</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script>
</body></html>
