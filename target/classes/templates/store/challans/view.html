<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Challan Detail — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('store')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/store">Store</a></li><li class="breadcrumb-item"><a href="/store/challans">Challans</a></li><li class="breadcrumb-item active">Detail</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-receipt me-2"></i>Challan — CH-—</h1></div>
    <div class="page-header-actions">
      <a href="/store/challans" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <form action="/store/challans/1/dispatch" method="post" class="d-inline"><button type="submit" class="btn btn-outline-primary btn-sm"><i class="bi bi-truck me-1"></i>Mark Dispatched</button></form>
      <form action="/store/challans/1/receive" method="post" class="d-inline"><button type="submit" class="btn btn-cms-primary btn-sm"><i class="bi bi-check-circle me-1"></i>Mark Received</button></form>
      <form action="/store/challans/1/cancel" method="post" class="d-inline"><button type="submit" class="btn btn-outline-danger btn-sm" data-confirm="Cancel this challan?"><i class="bi bi-x me-1"></i>Cancel</button></form>
    </div>
  </div>
  <div class="row g-3">
    <div class="col-md-8">
      <div class="cms-card mb-3">
        <div class="card-header-cms"><h5>Challan Info</h5></div>
        <div class="card-body-cms">
          <div class="row g-3">
            <div class="col-sm-4"><div class="detail-label">Challan #</div><div class="detail-value">—</div></div>
            <div class="col-sm-4"><div class="detail-label">Type</div><div class="detail-value">—</div></div>
            <div class="col-sm-4"><div class="detail-label">Status</div><div class="detail-value"><span class="cms-badge badge-draft">DRAFT</span></div></div>
            <div class="col-sm-4"><div class="detail-label">Date</div><div class="detail-value">—</div></div>
            <div class="col-sm-4"><div class="detail-label">Vehicle No.</div><div class="detail-value">—</div></div>
            <div class="col-sm-4"><div class="detail-label">Driver</div><div class="detail-value">—</div></div>
            <div class="col-sm-4"><div class="detail-label">Reference PO</div><div class="detail-value">—</div></div>
            <div class="col-12"><div class="detail-label">Remarks</div><div class="detail-value">—</div></div>
          </div>
        </div>
      </div>
      <div class="cms-card">
        <div class="card-header-cms"><h5>Challan Items</h5></div>
        <div class="cms-table-wrapper">
          <table class="cms-table">
            <thead><tr><th>#</th><th>Item</th><th>Unit</th><th>Quantity</th><th>Remarks</th></tr></thead>
            <tbody><tr><td colspan="5" class="text-center text-muted py-3">No items</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="cms-card">
        <div class="card-header-cms"><h5>Status History</h5></div>
        <div class="card-body-cms">
          <div class="cms-timeline">
            <div class="timeline-item"><div class="timeline-dot success"></div><div class="timeline-content">Challan Created<div class="timeline-meta">—</div></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script></body></html>
