<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Challan — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('store')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/store">Store</a></li><li class="breadcrumb-item"><a href="/store/challans">Challans</a></li><li class="breadcrumb-item active">New</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-receipt me-2"></i>New Challan</h1></div>
    <div class="page-header-actions"><a href="/store/challans" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
  </div>
  <form action="/store/challans/create" method="post">
    <div class="cms-card mb-3">
      <div class="card-header-cms"><h5>Challan Details</h5></div>
      <div class="card-body-cms">
        <div class="row g-3">
          <div class="col-sm-4"><label class="form-label">Challan Type <span class="text-danger">*</span></label>
            <select name="type" class="form-select" required><option>INWARD</option><option>OUTWARD</option></select></div>
          <div class="col-sm-4"><label class="form-label">Challan Date <span class="text-danger">*</span></label><input type="date" name="date" class="form-control" required/></div>
          <div class="col-sm-4"><label class="form-label">Reference PO</label><select name="poId" class="form-select"><option value="">None</option></select></div>
          <div class="col-sm-6"><label class="form-label">Vehicle Number</label><input type="text" name="vehicleNo" class="form-control" placeholder="MH 01 AB 1234"/></div>
          <div class="col-sm-6"><label class="form-label">Driver Name</label><input type="text" name="driverName" class="form-control"/></div>
          <div class="col-12"><label class="form-label">Remarks</label><textarea name="remarks" class="form-control" rows="2"></textarea></div>
        </div>
      </div>
    </div>
    <div class="cms-card mb-3">
      <div class="card-header-cms d-flex justify-content-between align-items-center"><h5>Items</h5><button type="button" class="btn btn-outline-primary btn-sm" id="addRow"><i class="bi bi-plus me-1"></i>Add Item</button></div>
      <div class="cms-table-wrapper">
        <table class="cms-table">
          <thead><tr><th>Item</th><th>Unit</th><th>Quantity</th><th>Remarks</th><th></th></tr></thead>
          <tbody id="challanBody">
            <tr class="challan-row">
              <td><select name="itemId[]" class="form-select form-select-sm"><option value="">Select item...</option></select></td>
              <td><input type="text" name="unit[]" class="form-control form-control-sm" readonly/></td>
              <td><input type="number" name="qty[]" class="form-control form-control-sm" min="1"/></td>
              <td><input type="text" name="remarks[]" class="form-control form-control-sm"/></td>
              <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-trash"></i></button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" name="action" value="DRAFT" class="btn btn-outline-secondary"><i class="bi bi-save me-1"></i>Save Draft</button>
      <button type="submit" name="action" value="DISPATCHED" class="btn btn-cms-primary"><i class="bi bi-truck me-1"></i>Save &amp; Dispatch</button>
      <a href="/store/challans" class="btn btn-outline-danger">Cancel</a>
    </div>
  </form>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script>
<script>
document.getElementById('addRow').addEventListener('click',function(){
  const tbody=document.getElementById('challanBody');
  const row=tbody.querySelector('.challan-row').cloneNode(true);
  row.querySelectorAll('input').forEach(i=>i.value='');
  tbody.appendChild(row);
});
document.addEventListener('click',function(e){
  if(e.target.closest('.remove-row')){
    const rows=document.querySelectorAll('.challan-row');
    if(rows.length>1)e.target.closest('tr').remove();
  }
});
</script>
</body></html>
