<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Purchase Order — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body><div class="cms-shell">
<aside class="cms-sidebar" th:replace="~{layout/main :: sidebar('store')}"></aside>
<div class="cms-main">
<header class="cms-topbar">
  <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
  <nav class="topbar-breadcrumb"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/dashboard">Home</a></li><li class="breadcrumb-item"><a href="/store">Store</a></li><li class="breadcrumb-item"><a href="/store/purchase-orders">Purchase Orders</a></li><li class="breadcrumb-item active">New PO</li></ol></nav>
  <div class="topbar-actions"><button class="topbar-icon-btn" onclick="location='/notifications'"><i class="bi bi-bell"></i><span class="badge-dot"></span></button></div>
</header>
<main class="cms-content">
  <div class="page-header">
    <div class="page-header-left"><h1><i class="bi bi-file-earmark-plus me-2"></i>New Purchase Order</h1></div>
    <div class="page-header-actions"><a href="/store/purchase-orders" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
  </div>
  <form action="/store/purchase-orders/create" method="post">
    <div class="cms-card mb-3">
      <div class="card-header-cms"><h5>Order Details</h5></div>
      <div class="card-body-cms">
        <div class="row g-3">
          <div class="col-sm-6"><label class="form-label">Supplier <span class="text-danger">*</span></label><select name="supplierId" class="form-select" required><option value="">Select supplier...</option></select></div>
          <div class="col-sm-3"><label class="form-label">Order Date <span class="text-danger">*</span></label><input type="date" name="orderDate" class="form-control" required/></div>
          <div class="col-sm-3"><label class="form-label">Expected Delivery</label><input type="date" name="expectedDate" class="form-control"/></div>
          <div class="col-12"><label class="form-label">Remarks</label><textarea name="remarks" class="form-control" rows="2"></textarea></div>
        </div>
      </div>
    </div>
    <div class="cms-card mb-3">
      <div class="card-header-cms d-flex align-items-center justify-content-between"><h5>Order Items</h5><button type="button" class="btn btn-outline-primary btn-sm" id="addItemRow"><i class="bi bi-plus me-1"></i>Add Item</button></div>
      <div class="card-body-cms p-0">
        <div class="cms-table-wrapper">
          <table class="cms-table" id="poItemsTable">
            <thead><tr><th style="width:35%">Item</th><th>Unit</th><th>Qty</th><th>Unit Price</th><th>Total</th><th></th></tr></thead>
            <tbody id="poItemsBody">
              <tr class="po-item-row">
                <td><select name="itemId[]" class="form-select form-select-sm"><option value="">Select item...</option></select></td>
                <td><input type="text" name="unit[]" class="form-control form-control-sm" placeholder="Unit" readonly/></td>
                <td><input type="number" name="qty[]" class="form-control form-control-sm" placeholder="0" min="1"/></td>
                <td><input type="number" name="unitPrice[]" class="form-control form-control-sm" placeholder="0.00" step="0.01"/></td>
                <td><input type="text" name="total[]" class="form-control form-control-sm" placeholder="0.00" readonly/></td>
                <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-trash"></i></button></td>
              </tr>
            </tbody>
            <tfoot><tr><td colspan="4" class="text-end fw-bold">Grand Total:</td><td><strong id="grandTotal">₹0.00</strong></td><td></td></tr></tfoot>
          </table>
        </div>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" name="action" value="DRAFT" class="btn btn-outline-secondary"><i class="bi bi-save me-1"></i>Save Draft</button>
      <button type="submit" name="action" value="SENT" class="btn btn-cms-primary"><i class="bi bi-send me-1"></i>Save &amp; Send to Supplier</button>
      <a href="/store/purchase-orders" class="btn btn-outline-danger">Cancel</a>
    </div>
  </form>
</main>
<footer class="cms-footer">&copy; 2026 CMS</footer>
</div></div>
<div class="cms-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cms-app.js}"></script>
<script>
document.getElementById('addItemRow').addEventListener('click', function(){
  const tbody = document.getElementById('poItemsBody');
  const row = tbody.querySelector('.po-item-row').cloneNode(true);
  row.querySelectorAll('input').forEach(i=>i.value='');
  tbody.appendChild(row);
});
document.addEventListener('click', function(e){
  if(e.target.closest('.remove-row')){
    const rows = document.querySelectorAll('.po-item-row');
    if(rows.length > 1) e.target.closest('tr').remove();
  }
});
</script>
</body></html>
