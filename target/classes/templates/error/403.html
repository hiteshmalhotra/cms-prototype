<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>403 Forbidden — CMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" th:href="@{/css/cms-theme.css}"/></head>
<body>
<div class="cms-auth-page" style="background:linear-gradient(135deg,#1F3864,#2E75B6)">
  <div class="cms-auth-card text-center">
    <div style="font-size:5rem;color:#FCE4D6;"><i class="bi bi-shield-x"></i></div>
    <h1 style="font-size:4rem;font-weight:800;color:#A32020;">403</h1>
    <h5 class="mb-2">Access Denied</h5>
    <p class="text-muted mb-4">You don't have permission to access this resource. Contact your administrator.</p>
    <a href="/dashboard" class="btn btn-cms-primary"><i class="bi bi-house me-1"></i>Back to Dashboard</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
